<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall Pass Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e0;
    --muted: #666;
    --safe: #2a9d3a;
    --safe-glow: rgba(42,157,58,0.15);
    --warn: #c94040;
    --warn-glow: rgba(201,64,64,0.18);
    --accent: #e8c547;
    --accent-dim: rgba(232,197,71,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .logo span { color: var(--muted); font-weight: 700; }

  .week-display {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .week-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: border-color 0.15s;
  }

  .week-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .week-label {
    font-size: 0.78rem;
    color: var(--text);
    min-width: 160px;
    text-align: center;
  }

  .class-tabs {
    display: flex;
    gap: 0;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .class-tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 12px 18px;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  .main {
    padding: 28px 32px;
    max-width: 1100px;
  }

  .class-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 22px;
  }

  .class-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
  }

  .class-count {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.safe { background: var(--safe); }
  .dot.warn { background: var(--warn); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  thead th {
    text-align: left;
    font-size: 0.63rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 12px 10px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  thead th.center { text-align: center; }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.1s;
  }

  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 9px 12px;
    vertical-align: middle;
  }

  .name-cell {
    font-size: 0.8rem;
    letter-spacing: 0.01em;
  }

  .name-cell.flagged { color: var(--warn); }

  .count-cell {
    text-align: center;
    font-size: 1rem;
    font-weight: 500;
    font-family: 'Syne', sans-serif;
  }

  .count-cell.safe { color: var(--safe); }
  .count-cell.warn { color: var(--warn); }
  .count-cell.zero { color: var(--muted); }

  .days-cell {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .day-btn {
    width: 30px;
    height: 30px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1px;
  }

  .day-btn:hover { border-color: var(--accent); color: var(--accent); }

  .day-btn.logged {
    background: var(--safe-glow);
    border-color: var(--safe);
    color: var(--safe);
  }

  .day-btn.logged.over {
    background: var(--warn-glow);
    border-color: var(--warn);
    color: var(--warn);
  }

  .day-label { font-size: 0.52rem; opacity: 0.7; }
  .day-count { font-size: 0.75rem; font-weight: 500; }

  .day-btn.readonly { opacity: 0.45; cursor: default; pointer-events: none; }
  .day-btn.today:not(.logged) { border-color: rgba(232,197,71,0.5); }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .badge.over { background: var(--warn-glow); color: var(--warn); border: 1px solid var(--warn); }
  .badge.ok { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(232,197,71,0.3); }
  .badge.unexcused { background: rgba(255,120,0,0.1); color: #ff9a3c; border: 1px solid rgba(255,120,0,0.3); }

  .reset-btn {
    margin-top: 28px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 7px 16px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--warn); color: var(--warn); }

  .summary-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
  .stat-label { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; }
  .stat-val.warn { color: var(--warn); }
  .stat-val.accent { color: var(--accent); }

  @media (max-width: 700px) {
    header, .main { padding: 16px; }
    .class-tabs { padding: 0 16px; }
    .day-btn { width: 26px; height: 26px; }
  }
</style>
</head>
<body>

<div class="class-tabs" id="classTabs"></div>

<div class="main" id="mainContent"></div>

const LIMIT = 2;

// ── Calendar helpers ──────────────────────────────────────────────────────────

// Returns the Monday of the current week + offset weeks, as a Date (midnight local)
function getMondayOf(offset) {
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setHours(0,0,0,0);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  return monday;
}

// Canonical week key: "YYYY-MM-DD" of that week's Monday
function getWeekKey(offset) {
  const mon = getMondayOf(offset);
  const y = mon.getFullYear();
  const m = String(mon.getMonth()+1).padStart(2,'0');
  const d = String(mon.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

// Current week key (offset 0)
function currentWeekKey() { return getWeekKey(0); }

// The 5 school-day Date objects for a given week offset
function getWeekDates(offset) {
  const mon = getMondayOf(offset);
  return [0,1,2,3,4].map(i => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

// "Mon 3/24" style
function fmtDayHeader(date) {
  const day = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
  return `${day} ${date.getMonth()+1}/${date.getDate()}`;
}

function weekLabel(offset) {
  const dates = getWeekDates(offset);
  const fmt = dt => dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(dates[0])} – ${fmt(dates[4])}`;
}

// ── Auto-purge: delete any localStorage keys older than current week ──────────
function purgeOldWeeks() {
  const cur = currentWeekKey();
  const toDelete = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key.startsWith('hp_')) continue;
    // key format: hp_{classId}_{YYYY-MM-DD}_{name}
    const parts = key.split('_');
    // find the date part (index 2 after "hp" and classId — but classId has no underscores... actually it might)
    // safer: extract by regex
    const m = key.match(/hp_[^_]+_(\d{4}-\d{2}-\d{2})_/);
    if (m && m[1] < cur) toDelete.push(key);
  }
  toDelete.forEach(k => localStorage.removeItem(k));
}

// ── State ─────────────────────────────────────────────────────────────────────
let weekOffset = 0;
let activeClass = CLASSES[0].id;

// Past weeks are read-only
function isLocked() { return weekOffset < 0; }

function storageKey(classId, weekKey, studentName) {
  return `hp_${classId}_${weekKey}_${studentName}`;
}

function getPassData(classId, weekKey, studentName) {
  const raw = localStorage.getItem(storageKey(classId, weekKey, studentName));
  return raw ? JSON.parse(raw) : {days: [0,0,0,0,0]};
}

function savePassData(classId, weekKey, studentName, data) {
  localStorage.setItem(storageKey(classId, weekKey, studentName), JSON.stringify(data));
}

function totalPasses(data) {
  return data.days.reduce((a,b) => a+b, 0);
}

purgeOldWeeks();

function render() {
  const weekKey = getWeekKey(weekOffset);
  const locked  = isLocked();
  const weekDates = getWeekDates(weekOffset);

  // Header label + lock indicator
  const lockTag = locked ? ' <span style="font-size:0.62rem;color:var(--muted);letter-spacing:0.08em">🔒 READ-ONLY</span>' : '';
  document.getElementById('weekLabel').innerHTML = weekLabel(weekOffset) + lockTag;

  // Disable "next" button if already at current week
  document.getElementById('nextWeek').disabled = weekOffset >= 0;
  document.getElementById('nextWeek').style.opacity = weekOffset >= 0 ? '0.3' : '1';

  // Tabs
  const tabsEl = document.getElementById('classTabs');
  tabsEl.innerHTML = CLASSES.map(c => `
    <button class="tab${c.id === activeClass ? ' active' : ''}" data-id="${c.id}">${c.short}</button>
  `).join('');
  tabsEl.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => { activeClass = btn.dataset.id; render(); });
  });

  const cls = CLASSES.find(c => c.id === activeClass);
  const studentsData = cls.students.map(s => ({
    ...s,
    data: getPassData(activeClass, weekKey, s.name)
  }));

  const over = studentsData.filter(s => totalPasses(s.data) > LIMIT).length;
  // Today's column index (Mon=0 … Fri=4); weekend falls back to Fri
  const todayDow = new Date().getDay();
  const todayIdx = weekOffset === 0
    ? (todayDow === 0 ? 4 : todayDow === 6 ? 4 : todayDow - 1)
    : -1;
  const totalToday = todayIdx >= 0
    ? studentsData.reduce((a,s) => a + s.data.days[todayIdx], 0)
    : '—';
  const totalWeek = studentsData.reduce((a,s) => a + totalPasses(s.data), 0);

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="class-header">
      <div class="class-title">${cls.label}</div>
      <div class="class-count">${cls.students.length} students${locked ? ' · past week (read-only)' : ''}</div>
    </div>
    <div class="summary-bar">
      <div class="stat"><div class="stat-val accent">${totalWeek}</div><div class="stat-label">Total This Week</div></div>
      <div class="stat"><div class="stat-val${over > 0 ? ' warn' : ''}">${over}</div><div class="stat-label">Over Limit</div></div>
      <div class="stat"><div class="stat-val">${totalToday}</div><div class="stat-label">Today</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="dot safe"></div> 1–2 passes</div>
      <div class="legend-item"><div class="dot warn"></div> 3+ passes (flagged)</div>
      ${locked ? '<div class="legend-item" style="color:var(--muted);font-size:0.65rem">Past weeks are read-only. Data auto-clears after the current week advances.</div>' : ''}
    </div>
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th class="center">Total</th>
          <th class="center">Status</th>
          ${weekDates.map((dt, i) => {
            const isToday = weekOffset === 0 && i === todayIdx;
            return `<th class="center" style="${isToday ? 'color:var(--accent)' : ''}">${fmtDayHeader(dt)}</th>`;
          }).join('')}
        </tr>
      </thead>
      <tbody id="studentRows"></tbody>
    </table>
    ${!locked ? `<button class="reset-btn" id="resetWeek">Reset this week's data</button>` : ''}
  `;

  const tbody = document.getElementById('studentRows');
  studentsData.forEach((s, si) => {
    const total = totalPasses(s.data);
    const isOver = total > LIMIT;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="name-cell${isOver ? ' flagged' : ''}">${s.name}</td>
      <td class="count-cell${total === 0 ? ' zero' : isOver ? ' warn' : ' safe'}">${total === 0 ? '—' : total}</td>
      <td style="text-align:center">
        ${total === 0 ? '' : isOver
          ? `<span class="badge over">⚠ Over</span>`
          : `<span class="badge ok">OK</span>`
        }
      </td>
      ${weekDates.map((dt, di) => {
        const isToday = weekOffset === 0 && di === todayIdx;
        const count = s.data.days[di];
        const btnClass = [
          'day-btn',
          count > 0 ? (isOver ? 'logged over' : 'logged') : '',
          isToday ? 'today' : '',
          locked ? 'readonly' : ''
        ].filter(Boolean).join(' ');
        return `
          <td style="${isToday ? 'background:rgba(232,197,71,0.04)' : ''}">
            <div class="days-cell">
              <button class="${btnClass}" data-si="${si}" data-di="${di}" ${locked ? 'disabled' : ''}>
                <span class="day-count">${count > 0 ? count : (locked ? '—' : '+')}</span>
              </button>
            </div>
          </td>`;
      }).join('')}
    `;
    tbody.appendChild(tr);
  });

  if (!locked) {
    // Click to increment, right-click to decrement
    tbody.querySelectorAll('.day-btn:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        const si = +btn.dataset.si, di = +btn.dataset.di;
        const s = studentsData[si];
        s.data.days[di]++;
        savePassData(activeClass, weekKey, s.name, s.data);
        render();
      });
      btn.addEventListener('contextmenu', e => {
        e.preventDefault();
        const si = +btn.dataset.si, di = +btn.dataset.di;
        const s = studentsData[si];
        if (s.data.days[di] > 0) {
          s.data.days[di]--;
          savePassData(activeClass, weekKey, s.name, s.data);
          render();
        }
      });
    });

    document.getElementById('resetWeek').addEventListener('click', () => {
      if (!confirm(`Reset all pass data for ${cls.label} — week of ${weekLabel(weekOffset)}?`)) return;
      cls.students.forEach(s => localStorage.removeItem(storageKey(activeClass, weekKey, s.name)));
      render();
    });
  }
}

document.getElementById('prevWeek').addEventListener('click', () => { weekOffset--; render(); });
document.getElementById('nextWeek').addEventListener('click', () => { if (weekOffset < 0) { weekOffset++; render(); } });

render();
</script>
